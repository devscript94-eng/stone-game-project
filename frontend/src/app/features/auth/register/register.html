<div class="register-page">
  <section class="register-page__card">
    <header class="register-page__header">
      <h2 class="register-page__title">Register</h2>
      <p class="register-page__subtitle">
        Create your account and start playing.
      </p>
    </header>

    <form class="register-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-field">
        <label class="form-field__label" for="username">Username</label>
        <input
          class="form-field__input"
          id="username"
          type="text"
          formControlName="username"
          placeholder="Choose a username" />
      </div>

      <div class="form-field">
        <label class="form-field__label" for="email">Email</label>
        <input
          class="form-field__input"
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email" />
      </div>

      <div class="form-field">
        <label class="form-field__label" for="password">Password</label>
        <input
          class="form-field__input"
          id="password"
          type="password"
          formControlName="password"
          placeholder="Create a password" />
      </div>

      <div class="register-page__actions">
        <button class="btn btn--accent btn--block" type="submit">
          Register
        </button>
      </div>
    </form>

    @if (errorMessage) {
      <p class="status-message status-message--error">{{ errorMessage }}</p>
    }

    <footer class="register-page__footer">
      <p>
        Already have an account?
        <a class="register-page__link" routerLink="/login">Login</a>
      </p>
    </footer>
  </section>
</div>
