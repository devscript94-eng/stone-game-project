services:
  mongo:
    image: mongo:7
    container_name: stonegame-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stonegame-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      JWT_SECRET: Q3ZQY3V3b0l4QW5tT3p3Yk1iQm9tZ0x2Y1pZd3JvR2d5Y2x2S2h4dQ==
      DB_URI: mongodb://admin:admin@mongo:27017/stonegame?authSource=admin
      JWT_EXPIRATION: 86400000
    labels:
      logging: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stonegame-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    labels:
      logging: "true"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: stonegame-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: stonegame-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: stonegame-fluent-bit
    restart: unless-stopped
    depends_on:
      - elasticsearch
    volumes:
      - ./monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./monitoring/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  kibana-setup:
    image: curlimages/curl:8.7.1
    container_name: stonegame-kibana-setup
    depends_on:
      - kibana
    entrypoint:
      - sh
      - -c
      - |
        set -e

        echo "Waiting for Kibana API..."
        until [ "$(curl -s -o /dev/null -w '%{http_code}' http://kibana:5601/api/status)" = "200" ]; do
          sleep 5
        done

        echo "Waiting for Kibana to be ready..."
        until curl -s http://kibana:5601/api/status | grep -q '"available"'; do
          sleep 5
        done

        echo "Checking existing data views..."
        EXISTING=$$(curl -s http://kibana:5601/api/data_views \
          -H "kbn-xsrf: true")

        echo "$$EXISTING" | grep -q 'Stonegame Logs' && {
          echo "Data view already exists."
          exit 0
        }

        echo "Creating Stonegame Logs data view..."
        RESPONSE=$$(curl -s -w '\n%{http_code}' -X POST http://kibana:5601/api/data_views/data_view \
          -H "Content-Type: application/json" \
          -H "kbn-xsrf: true" \
          -d '{
            "data_view": {
              "name": "Stonegame Logs",
              "title": "stonegame-logs-*",
              "timeFieldName": "@timestamp"
            }
          }')

        BODY=$$(echo "$$RESPONSE" | sed '$$d')
        STATUS=$$(echo "$$RESPONSE" | tail -n1)

        echo "$$BODY"

        if [ "$$STATUS" != "200" ] && [ "$$STATUS" != "201" ]; then
          echo "Failed to create data view. HTTP status: $$STATUS"
          exit 1
        fi

        echo "Data view created successfully."
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    container_name: stonegame-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      - backend
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: stonegame-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  mongo_data:
  elastic_data:
  prometheus_data:
  grafana_data: