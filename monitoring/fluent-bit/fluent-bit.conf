[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  5

[OUTPUT]
    Name               es
    Match              docker.*
    Host               elasticsearch
    Port               9200
    Logstash_Format    On
    Logstash_Prefix    stonegame-logs
    Retry_Limit        False
    Suppress_Type_Name On